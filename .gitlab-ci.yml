# Main GitLab CI/CD pipeline configuration for cloudflared
# Orchestrates builds across Linux, macOS, and Windows platforms

default:
  interruptible: true

stages:
  - build-image
  - build
  - test
  - package
  - publish

variables:
  GO_VERSION: "1.21"
  BINARY_NAME: "cloudflared"
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# Include platform-specific pipeline definitions
include:
  - local: ".ci/commons.gitlab-ci.yml"
  - local: ".ci/ci-image.gitlab-ci.yml"
  - local: ".ci/linux.gitlab-ci.yml"
  - local: ".ci/mac.gitlab-ci.yml"
  - local: ".ci/windows.gitlab-ci.yml"
  - local: ".ci/apt-internal.gitlab-ci.yml"
  - local: ".ci/github.gitlab-ci.yml"

# Workflow rules: run on merge requests, tags, and default branch
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_IID
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_BRANCH =~ /^release\/.*/
