# Windows build and test pipeline for cloudflared
# Handles building, signing, and packaging the Windows MSI installer

.windows-shared: &windows-shared
  tags:
    - windows
  before_script:
    - $env:PATH = "C:\Go\bin;" + $env:PATH
    - go version
    - go env GOPATH

build-windows-amd64:
  <<: *windows-shared
  stage: build
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  variables:
    GOOS: windows
    GOARCH: amd64
    TARGET_OS: windows
  script:
    - |
      $version = (git describe --tags --always --dirty 2>$null)
      if (-not $version) { $version = "dev" }
      Write-Host "Building cloudflared version: $version"
    - go build -v
        -ldflags "-X 'main.Version=$env:CI_COMMIT_TAG' -X 'main.BuildTime=$(Get-Date -Format o)'"
        -o cloudflared-windows-amd64.exe
        ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-amd64.exe
    expire_in: 1 week

build-windows-386:
  <<: *windows-shared
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG'
  variables:
    GOOS: windows
    GOARCH: "386"
  script:
    - go build -v
        -ldflags "-X 'main.Version=$env:CI_COMMIT_TAG' -X 'main.BuildTime=$(Get-Date -Format o)'"
        -o cloudflared-windows-386.exe
        ./cmd/cloudflared
  artifacts:
    paths:
      - cloudflared-windows-386.exe
    expire_in: 1 week

test-windows:
  <<: *windows-shared
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - go test ./... -v -count=1 -timeout 5m
  allow_failure: false

package-windows-msi:
  <<: *windows-shared
  stage: package
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - build-windows-amd64
  variables:
    WIX_PATH: 'C:\Program Files (x86)\WiX Toolset v3.11\bin'
  script:
    - |
      $version = $env:CI_COMMIT_TAG -replace '^v', ''
      Write-Host "Packaging MSI for version: $version"
      & "$env:WIX_PATH\candle.exe" -dVersion=$version -dBinaryPath=cloudflared-windows-amd64.exe wix\cloudflared.wxs
      & "$env:WIX_PATH\light.exe" -ext WixUIExtension cloudflared.wixobj -o cloudflared-amd64.msi
  artifacts:
    paths:
      - cloudflared-amd64.msi
    expire_in: 1 month

sign-windows:
  <<: *windows-shared
  stage: sign
  rules:
    - if: '$CI_COMMIT_TAG'
  needs:
    - package-windows-msi
  script:
    - |
      Write-Host "Signing MSI package..."
      # Signing step — requires SIGNING_CERT and SIGNING_KEY env vars
      if ($env:SIGNING_CERT) {
        signtool sign /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 cloudflared-amd64.msi
      } else {
        Write-Warning "No signing certificate configured, skipping signing."
      }
  artifacts:
    paths:
      - cloudflared-amd64.msi
    expire_in: 1 month
